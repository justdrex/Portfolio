<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>justdrex | Certifications</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="apple-touch-icon" href="assets/logo.png" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">

    <style>
      :root {
        --bg: #ffffff;
        --text: #111111;
        --muted: #666666;
        --border: #e8e8e8;
        --max: 860px;
      }

      * { box-sizing: border-box; }

      html, body {
        height: 100%;
        margin: 0;
        font-family: "Jersey 10", system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
        overflow: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
        border-bottom: 1px solid transparent;
      }
      a:hover { border-bottom-color: currentColor; }

      .page {
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .nav {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
        z-index: 10;
        flex-shrink: 0;
      }

      .nav-inner {
        padding: 12px 18px;
        display: flex;
        align-items: center;
      }

      .brand {
        font-size: 22px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .brand,
      .brand:hover {
        border-bottom: none;
      }

      .logo {
        width: 34px;
        height: 34px;
        border-radius: 8px;
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .content {
        width: min(100%, var(--max));
        margin: 0 auto;
        padding: 40px 18px 30px;
        flex-shrink: 0;
      }

      h1 {
        font-size: clamp(30px, 5vw, 44px);
        margin: 0 0 18px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 18px;
        margin-bottom: 0;
        max-width: 70ch;
        line-height: 1.6;
      }

      /* ===== CIRCULAR GALLERY ===== */
      .gallery-container {
        flex: 1;
        position: relative;
        width: 100%;
        min-height: 0;
      }

      .circular-gallery {
        width: 100%;
        height: 100%;
        overflow: hidden;
        cursor: grab;
      }

      .circular-gallery:active {
        cursor: grabbing;
      }

      footer {
        width: min(100%, var(--max));
        margin: 0 auto;
        padding: 18px 18px 22px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 13px;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        flex-shrink: 0;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0b0c;
          --text: #f5f5f5;
          --muted: #a6a6a6;
          --border: #202023;
        }

        .nav {
          background: rgba(11, 11, 12, 0.8);
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <nav class="nav">
        <div class="nav-inner">
          <a class="brand" href="/home">
            <img src="assets/logo.png" class="logo" alt="logo">
          </a>
        </div>
      </nav>

      <main>
        <div class="content">
          <h1>Certifications</h1>
          <p class="subtitle">
            A collection of certifications and courses I've completed (or plan to).
          </p>
        </div>

        <div class="gallery-container" id="galleryContainer"></div>
      </main>

      <footer>
        <div>© <span id="year"></span> justdrex</div>
        <div>Built with clarity.</div>
      </footer>
    </div>

    <script type="module">
      // Set year
      document.getElementById("year").textContent = new Date().getFullYear();

      // Import OGL library
      import { Camera, Mesh, Plane, Program, Renderer, Texture, Transform } from 'https://cdn.skypack.dev/ogl';

      // Utility functions
      function debounce(func, wait) {
        let timeout;
        return function (...args) {
          clearTimeout(timeout);
          timeout = setTimeout(() => func.apply(this, args), wait);
        };
      }

      function lerp(p1, p2, t) {
        return p1 + (p2 - p1) * t;
      }

      function autoBind(instance) {
        const proto = Object.getPrototypeOf(instance);
        Object.getOwnPropertyNames(proto).forEach(key => {
          if (key !== 'constructor' && typeof instance[key] === 'function') {
            instance[key] = instance[key].bind(instance);
          }
        });
      }

      function createTextTexture(gl, text, font = 'bold 30px Jersey 10', color = 'white') {
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        context.font = font;
        const metrics = context.measureText(text);
        const textWidth = Math.ceil(metrics.width);
        const textHeight = Math.ceil(parseInt(font, 10) * 1.2);
        canvas.width = textWidth + 20;
        canvas.height = textHeight + 20;
        context.font = font;
        context.fillStyle = color;
        context.textBaseline = 'middle';
        context.textAlign = 'center';
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.fillText(text, canvas.width / 2, canvas.height / 2);
        const texture = new Texture(gl, { generateMipmaps: false });
        texture.image = canvas;
        return { texture, width: canvas.width, height: canvas.height };
      }

      class Title {
        constructor({ gl, plane, renderer, text, textColor = '#ffffff', font = '30px Jersey 10' }) {
          autoBind(this);
          this.gl = gl;
          this.plane = plane;
          this.renderer = renderer;
          this.text = text;
          this.textColor = textColor;
          this.font = font;
          this.createMesh();
        }
        createMesh() {
          const { texture, width, height } = createTextTexture(this.gl, this.text, this.font, this.textColor);
          const geometry = new Plane(this.gl);
          const program = new Program(this.gl, {
            vertex: `
              attribute vec3 position;
              attribute vec2 uv;
              uniform mat4 modelViewMatrix;
              uniform mat4 projectionMatrix;
              varying vec2 vUv;
              void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
              }
            `,
            fragment: `
              precision highp float;
              uniform sampler2D tMap;
              varying vec2 vUv;
              void main() {
                vec4 color = texture2D(tMap, vUv);
                if (color.a < 0.1) discard;
                gl_FragColor = color;
              }
            `,
            uniforms: { tMap: { value: texture } },
            transparent: true
          });
          this.mesh = new Mesh(this.gl, { geometry, program });
          const aspect = width / height;
          const textHeight = this.plane.scale.y * 0.15;
          const textWidth = textHeight * aspect;
          this.mesh.scale.set(textWidth, textHeight, 1);
          this.mesh.position.y = -this.plane.scale.y * 0.5 - textHeight * 0.5 - 0.05;
          this.mesh.setParent(this.plane);
        }
      }

      class Media {
        constructor({
          geometry,
          gl,
          image,
          index,
          length,
          renderer,
          scene,
          screen,
          text,
          viewport,
          bend,
          textColor,
          borderRadius = 0,
          font
        }) {
          this.extra = 0;
          this.geometry = geometry;
          this.gl = gl;
          this.image = image;
          this.index = index;
          this.length = length;
          this.renderer = renderer;
          this.scene = scene;
          this.screen = screen;
          this.text = text;
          this.viewport = viewport;
          this.bend = bend;
          this.textColor = textColor;
          this.borderRadius = borderRadius;
          this.font = font;
          this.createShader();
          this.createMesh();
          this.createTitle();
          this.onResize();
        }
        createShader() {
          const texture = new Texture(this.gl, {
            generateMipmaps: true
          });
          this.program = new Program(this.gl, {
            depthTest: false,
            depthWrite: false,
            vertex: `
              precision highp float;
              attribute vec3 position;
              attribute vec2 uv;
              uniform mat4 modelViewMatrix;
              uniform mat4 projectionMatrix;
              varying vec2 vUv;
              void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
              }
            `,
            fragment: `
              precision highp float;
              uniform vec2 uImageSizes;
              uniform vec2 uPlaneSizes;
              uniform sampler2D tMap;
              uniform float uBorderRadius;
              varying vec2 vUv;
              
              float roundedBoxSDF(vec2 p, vec2 b, float r) {
                vec2 d = abs(p) - b;
                return length(max(d, vec2(0.0))) + min(max(d.x, d.y), 0.0) - r;
              }
              
              void main() {
                vec2 ratio = vec2(
                  min((uPlaneSizes.x / uPlaneSizes.y) / (uImageSizes.x / uImageSizes.y), 1.0),
                  min((uPlaneSizes.y / uPlaneSizes.x) / (uImageSizes.y / uImageSizes.x), 1.0)
                );
                vec2 uv = vec2(
                  vUv.x * ratio.x + (1.0 - ratio.x) * 0.5,
                  vUv.y * ratio.y + (1.0 - ratio.y) * 0.5
                );
                vec4 color = texture2D(tMap, uv);
                
                float d = roundedBoxSDF(vUv - 0.5, vec2(0.5 - uBorderRadius), uBorderRadius);
                
                float edgeSmooth = 0.002;
                float alpha = 1.0 - smoothstep(-edgeSmooth, edgeSmooth, d);
                
                gl_FragColor = vec4(color.rgb, alpha);
              }
            `,
            uniforms: {
              tMap: { value: texture },
              uPlaneSizes: { value: [0, 0] },
              uImageSizes: { value: [0, 0] },
              uBorderRadius: { value: this.borderRadius }
            },
            transparent: true
          });
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.src = this.image;
          img.onload = () => {
            texture.image = img;
            this.program.uniforms.uImageSizes.value = [img.naturalWidth, img.naturalHeight];
          };
        }
        createMesh() {
          this.plane = new Mesh(this.gl, {
            geometry: this.geometry,
            program: this.program
          });
          this.plane.setParent(this.scene);
        }
        createTitle() {
          this.title = new Title({
            gl: this.gl,
            plane: this.plane,
            renderer: this.renderer,
            text: this.text,
            textColor: this.textColor,
            font: this.font
          });
        }
        update(scroll, direction) {
          this.plane.position.x = this.x - scroll.current - this.extra;

          const x = this.plane.position.x;
          const H = this.viewport.width / 2;

          if (this.bend === 0) {
            this.plane.position.y = 0;
            this.plane.rotation.z = 0;
          } else {
            const B_abs = Math.abs(this.bend);
            const R = (H * H + B_abs * B_abs) / (2 * B_abs);
            const effectiveX = Math.min(Math.abs(x), H);

            const arc = R - Math.sqrt(R * R - effectiveX * effectiveX);
            if (this.bend > 0) {
              this.plane.position.y = -arc;
              this.plane.rotation.z = -Math.sign(x) * Math.asin(effectiveX / R);
            } else {
              this.plane.position.y = arc;
              this.plane.rotation.z = Math.sign(x) * Math.asin(effectiveX / R);
            }
          }

          const planeOffset = this.plane.scale.x / 2;
          const viewportOffset = this.viewport.width / 2;
          this.isBefore = this.plane.position.x + planeOffset < -viewportOffset;
          this.isAfter = this.plane.position.x - planeOffset > viewportOffset;
          if (direction === 'right' && this.isBefore) {
            this.extra -= this.widthTotal;
            this.isBefore = this.isAfter = false;
          }
          if (direction === 'left' && this.isAfter) {
            this.extra += this.widthTotal;
            this.isBefore = this.isAfter = false;
          }
        }
        onResize({ screen, viewport } = {}) {
          if (screen) this.screen = screen;
          if (viewport) {
            this.viewport = viewport;
            if (this.plane.program.uniforms.uViewportSizes) {
              this.plane.program.uniforms.uViewportSizes.value = [this.viewport.width, this.viewport.height];
            }
          }
          // Calculate scale to make cards much larger and wider
          const heightScale = this.screen.height / 800;
          
          // Set height based on screen
          this.plane.scale.y = (this.viewport.height * (700 * heightScale)) / this.screen.height;
          
          // Calculate width to maintain certificate aspect ratio (roughly 4:3)
          const certificateAspectRatio = 1.33; // width / height ratio for certificates
          this.plane.scale.x = this.plane.scale.y * certificateAspectRatio;
          
          this.plane.program.uniforms.uPlaneSizes.value = [this.plane.scale.x, this.plane.scale.y];
          this.padding = 1.0;
          this.width = this.plane.scale.x + this.padding;
          this.widthTotal = this.width * this.length;
          this.x = this.width * this.index;
        }
      }

      class App {
        constructor(
          container,
          {
            items,
            bend,
            textColor = '#ffffff',
            borderRadius = 0,
            font = 'bold 30px Jersey 10',
            scrollSpeed = 2,
            scrollEase = 0.05
          } = {}
        ) {
          this.container = container;
          this.scrollSpeed = scrollSpeed;
          this.scroll = { ease: scrollEase, current: 0, target: 0, last: 0 };
          this.onCheckDebounce = debounce(this.onCheck.bind(this), 200);
          this.createRenderer();
          this.createCamera();
          this.createScene();
          this.onResize();
          this.createGeometry();
          this.createMedias(items, bend, textColor, borderRadius, font);
          this.update();
          this.addEventListeners();
        }
        createRenderer() {
          this.renderer = new Renderer({
            alpha: true,
            antialias: true,
            dpr: Math.min(window.devicePixelRatio || 1, 2)
          });
          this.gl = this.renderer.gl;
          this.gl.clearColor(0, 0, 0, 0);
          this.container.appendChild(this.gl.canvas);
        }
        createCamera() {
          this.camera = new Camera(this.gl);
          this.camera.fov = 45;
          this.camera.position.z = 20;
        }
        createScene() {
          this.scene = new Transform();
        }
        createGeometry() {
          this.planeGeometry = new Plane(this.gl, {
            heightSegments: 10,
            widthSegments: 10
          });
        }
        createMedias(items, bend = 1, textColor, borderRadius, font) {
          const galleryItems = items || [
            { image: `assets/tryhackmecert.jpg`, text: 'TryHackMe – Complete Beginner' },
            { image: `assets/harvardx.jpg`, text: 'HarvardX – CS50 (in progress)' },
            { image: `assets/google.jpg`, text: 'Google Cybersecurity (planned)' },
            { image: `assets/ibm.jpg`, text: 'IBM Security Fundamentals (planned)' }
          ];
          this.mediasImages = galleryItems.concat(galleryItems);
          this.medias = this.mediasImages.map((data, index) => {
            return new Media({
              geometry: this.planeGeometry,
              gl: this.gl,
              image: data.image,
              index,
              length: this.mediasImages.length,
              renderer: this.renderer,
              scene: this.scene,
              screen: this.screen,
              text: data.text,
              viewport: this.viewport,
              bend,
              textColor,
              borderRadius,
              font
            });
          });
        }
        onTouchDown(e) {
          this.isDown = true;
          this.scroll.position = this.scroll.current;
          this.start = e.touches ? e.touches[0].clientX : e.clientX;
        }
        onTouchMove(e) {
          if (!this.isDown) return;
          const x = e.touches ? e.touches[0].clientX : e.clientX;
          const distance = (this.start - x) * (this.scrollSpeed * 0.025);
          this.scroll.target = this.scroll.position + distance;
        }
        onTouchUp() {
          this.isDown = false;
          this.onCheck();
        }
        onWheel(e) {
          const delta = e.deltaY || e.wheelDelta || e.detail;
          this.scroll.target += (delta > 0 ? this.scrollSpeed : -this.scrollSpeed) * 0.2;
          this.onCheckDebounce();
        }
        onCheck() {
          if (!this.medias || !this.medias[0]) return;
          const width = this.medias[0].width;
          const itemIndex = Math.round(Math.abs(this.scroll.target) / width);
          const item = width * itemIndex;
          this.scroll.target = this.scroll.target < 0 ? -item : item;
        }
        onResize() {
          this.screen = {
            width: this.container.clientWidth,
            height: this.container.clientHeight
          };
          this.renderer.setSize(this.screen.width, this.screen.height);
          this.camera.perspective({
            aspect: this.screen.width / this.screen.height
          });
          const fov = (this.camera.fov * Math.PI) / 180;
          const height = 2 * Math.tan(fov / 2) * this.camera.position.z;
          const width = height * this.camera.aspect;
          this.viewport = { width, height };
          if (this.medias) {
            this.medias.forEach(media => media.onResize({ screen: this.screen, viewport: this.viewport }));
          }
        }
        update() {
          this.scroll.current = lerp(this.scroll.current, this.scroll.target, this.scroll.ease);
          const direction = this.scroll.current > this.scroll.last ? 'right' : 'left';
          if (this.medias) {
            this.medias.forEach(media => media.update(this.scroll, direction));
          }
          this.renderer.render({ scene: this.scene, camera: this.camera });
          this.scroll.last = this.scroll.current;
          this.raf = window.requestAnimationFrame(this.update.bind(this));
        }
        addEventListeners() {
          this.boundOnResize = this.onResize.bind(this);
          this.boundOnWheel = this.onWheel.bind(this);
          this.boundOnTouchDown = this.onTouchDown.bind(this);
          this.boundOnTouchMove = this.onTouchMove.bind(this);
          this.boundOnTouchUp = this.onTouchUp.bind(this);
          window.addEventListener('resize', this.boundOnResize);
          window.addEventListener('mousewheel', this.boundOnWheel);
          window.addEventListener('wheel', this.boundOnWheel);
          window.addEventListener('mousedown', this.boundOnTouchDown);
          window.addEventListener('mousemove', this.boundOnTouchMove);
          window.addEventListener('mouseup', this.boundOnTouchUp);
          window.addEventListener('touchstart', this.boundOnTouchDown);
          window.addEventListener('touchmove', this.boundOnTouchMove);
          window.addEventListener('touchend', this.boundOnTouchUp);
        }
        destroy() {
          window.cancelAnimationFrame(this.raf);
          window.removeEventListener('resize', this.boundOnResize);
          window.removeEventListener('mousewheel', this.boundOnWheel);
          window.removeEventListener('wheel', this.boundOnWheel);
          window.removeEventListener('mousedown', this.boundOnTouchDown);
          window.removeEventListener('mousemove', this.boundOnTouchMove);
          window.removeEventListener('mouseup', this.boundOnTouchUp);
          window.removeEventListener('touchstart', this.boundOnTouchDown);
          window.removeEventListener('touchmove', this.boundOnTouchMove);
          window.removeEventListener('touchend', this.boundOnTouchUp);
          if (this.renderer && this.renderer.gl && this.renderer.gl.canvas.parentNode) {
            this.renderer.gl.canvas.parentNode.removeChild(this.renderer.gl.canvas);
          }
        }
      }

      // Initialize the circular gallery
      const galleryContainer = document.getElementById('galleryContainer');
      const app = new App(galleryContainer, {
        bend: 0.5,
        textColor: '#ffffff',
        borderRadius: 0.05,
        scrollSpeed: 2,
        scrollEase: 0.05,
        font: 'bold 30px Jersey 10'
      });
    </script>
  </body>
</html>
